# Template: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
# Build On Multiple Platform
name: Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows
            arch: x86_64
            plat: windows
            xmake-arch: x64
            runs-on: windows-latest

          - os: ubuntu
            arch: x86_64
            plat: linux
            xmake-arch: x86_64
            runs-on: ubuntu-latest

          - os: ubuntu
            arch: arm64
            plat: linux
            xmake-arch: arm64
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v4
      with:
        # pull_request 时 checkout PR 源分支，即 github.head_ref。
        # push / workflow_dispatch 时，github.head_ref 为空，checkout 当前 ref，即 github.ref。
        ref: ${{ github.head_ref || github.ref }}

    - name: Setup XMake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Build and Run
      working-directory: ${{ github.workspace }}
      shell: bash
      run: |
        for mode in debug release; do
          echo "Building $mode"

          xmake f \
            -m $mode \
            -p ${{ matrix.plat }} \
            -a ${{ matrix.xmake-arch }} \
            -y

          xmake build
          xmake run
        done
